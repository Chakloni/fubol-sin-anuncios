<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Player Ad-Free - Dual Live TV</title>

    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <style>
        /* Centrado absoluto en la pantalla con fondo oscuro */
        body {
            background-color: #0b0b0e;
            color: #efefef;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Contenedor principal ampliado para dos pantallas */
        .player-card {
            max-width: 70%;
            background-color: #16161a;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #24242b;
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #8a8ab0;
            font-weight: 500;
        }

        /* Grid para poner ambos videos lado a lado */
        .streams-container {
            display: flex;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        /* Responsividad para pantallas pequeñas (móviles) */
        @media (max-width: 800px) {
            .streams-container {
                grid-template-columns: 1fr;
            }
        }

        /* Contenedor relativo del video */
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            cursor: default;
            transition: cursor 0.3s ease;
        }

        .video-container.hide-interface {
            cursor: none;
        }

        video {
            width: 100%;
            display: block;
        }

        /* ----- BOTÓN TOP-LEFT (PLAY/PAUSE) ----- */
        .play-pause-top {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.1s ease;
            pointer-events: auto;
        }

        /* ----- BARRA DE CONTROLES INFERIOR ----- */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            align-items: center;
            padding: 25px 15px 15px 15px;
            gap: 20px;
            z-index: 9;
            opacity: 1;
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }

        .video-container.hide-interface .custom-controls,
        .video-container.hide-interface .play-pause-top {
            opacity: 0;
            pointer-events: none;
        }

        .video-container.paused .custom-controls,
        .video-container.paused .play-pause-top {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .play-pause-top:hover,
        .control-btn:hover {
            transform: scale(1.1);
        }

        .control-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        .play-pause-top svg {
            width: 30px;
            height: 30px;
            fill: currentColor;
        }

        .icon-play,
        .icon-volume-up {
            display: block;
        }

        .icon-pause,
        .icon-volume-mute {
            display: none;
        }

        .playing .icon-play {
            display: none;
        }

        .playing .icon-pause {
            display: block;
        }

        .muted .icon-volume-up {
            display: none;
        }

        .muted .icon-volume-mute {
            display: block;
        }

        .volume-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100px;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            margin-top: -5px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #efefef;
            margin-left: auto;
            /* Empuja el indicador a la derecha */
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3b30;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(255, 59, 48, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }
    </style>
</head>

<body>

    <div class="player-card">

        <div class="streams-container">
            <div class="video-container paused" id="player1">
                <video autoplay></video>
                <button class="play-pause-top" title="Reproducir/Pausar">
                    <svg class="icon-play" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg class="icon-pause" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <div class="custom-controls">
                    <button class="control-btn fullscreen-btn" title="Pantalla Completa">
                        <svg viewBox="0 0 24 24">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                        </svg>
                    </button>
                    <div class="volume-wrapper">
                        <button class="control-btn mute-btn" title="Silenciar">
                            <svg class="icon-volume-up" viewBox="0 0 24 24">
                                <path
                                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                            </svg>
                            <svg class="icon-volume-mute" viewBox="0 0 24 24">
                                <path
                                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                            </svg>
                        </button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>
                    <div class="live-indicator">
                        <div class="live-dot"></div>
                        BOSNIA AND HERZEGOVINA VS. USA
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función reutilizable para inicializar reproductores independientes
        function inicializarReproductor(idContenedor, urlStreaming) {
            const contenedor = document.getElementById(idContenedor);
            if (!contenedor) return;

            const video = contenedor.querySelector('video');
            const playPauseBtn = contenedor.querySelector('.play-pause-top');
            const muteBtn = contenedor.querySelector('.mute-btn');
            const volumeSlider = contenedor.querySelector('.volume-slider');
            const fullscreenBtn = contenedor.querySelector('.fullscreen-btn');
            const customControls = contenedor.querySelector('.custom-controls');

            let hlsInstancia = null;
            video.volume = 1;

            // ---- LÓGICA DE REPRODUCCIÓN HLS ----
            let dashInstancia = null;
            video.volume = 1;

            if (urlStreaming) {
                // Creamos e inicializamos el reproductor dash.js
                dashInstancia = dashjs.MediaPlayer().create();

                // Vinculamos el elemento de video, pasamos la URL y configuramos el autoPlay en true
                dashInstancia.initialize(video, urlStreaming, true);

                // Manejo de fallos en el autoplay debido a políticas del navegador
                video.play().catch(() => {
                    console.log(`Autoplay bloqueado en ${idContenedor}.`);
                    mostrarInterfazYResetearTiempo();
                });
            }

            // ---- LÓGICA DE INTERFAZ Y TIMEOUT INDEPENDIENTE ----
            let inactivityTimeout;
            const OcultarTrasMilisegundos = 3000;

            function ocultarInterfaz() {
                if (!video.paused) {
                    contenedor.classList.add('hide-interface');
                }
            }

            function mostrarInterfazYResetearTiempo() {
                contenedor.classList.remove('hide-interface');
                clearTimeout(inactivityTimeout);
                inactivityTimeout = setTimeout(ocultarInterfaz, OcultarTrasMilisegundos);
            }

            // Eventos de actividad
            contenedor.addEventListener('mousemove', mostrarInterfazYResetearTiempo);
            contenedor.addEventListener('mousedown', mostrarInterfazYResetearTiempo);
            contenedor.addEventListener('touchstart', mostrarInterfazYResetearTiempo);
            contenedor.addEventListener('click', mostrarInterfazYResetearTiempo);

            customControls.addEventListener('click', (e) => {
                e.stopPropagation();
                mostrarInterfazYResetearTiempo();
            });

            // ---- CONTROLES PERSONALIZADOS ----
            function togglePlay() {
                if (video.paused) {
                    // Si es una transmisión en vivo, dash.js maneja la sincronización al reproducir de nuevo
                    if (dashInstancia && dashInstancia.isLive()) {
                        dashInstancia.seek(dashInstancia.duration());
                    }
                    video.play();
                } else {
                    video.pause();
                }
                mostrarInterfazYResetearTiempo();
            }

            playPauseBtn.addEventListener('click', togglePlay);

            video.addEventListener('click', (e) => {
                if (contenedor.classList.contains('hide-interface')) {
                    mostrarInterfazYResetearTiempo();
                    e.stopPropagation();
                } else {
                    togglePlay();
                }
            });

            video.addEventListener('play', () => {
                playPauseBtn.classList.add('playing');
                contenedor.classList.remove('paused');
                mostrarInterfazYResetearTiempo();
            });

            video.addEventListener('pause', () => {
                playPauseBtn.classList.remove('playing');
                contenedor.classList.add('paused');
                clearTimeout(inactivityTimeout);
                contenedor.classList.remove('hide-interface');
            });

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                mostrarInterfazYResetearTiempo();
            });

            volumeSlider.addEventListener('input', (e) => {
                video.volume = parseFloat(e.target.value);
                video.muted = (video.volume === 0);
                mostrarInterfazYResetearTiempo();
            });

            video.addEventListener('volumechange', () => {
                if (video.muted || video.volume === 0) {
                    muteBtn.classList.add('muted');
                    volumeSlider.value = 0;
                } else {
                    muteBtn.classList.remove('muted');
                    volumeSlider.value = video.volume;
                }
            });

            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    if (contenedor.requestFullscreen) contenedor.requestFullscreen();
                    else if (contenedor.webkitRequestFullscreen) contenedor.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
                mostrarInterfazYResetearTiempo();
            });

            // Primer inicio de temporizador
            mostrarInterfazYResetearTiempo();
        }
        // Inicializamos ambos reproductores asignándoles su propia URL
        inicializarReproductor('player1', 'https://otte.live.fly.ww.aiv-cdn.net/pdx-nitro/live/clients/dash/enc/qubxnja5rl/out/v1/4ef0db80aa3341e2babb58314541f1e0/cenc.mpd');
    </script>

</body>

</html>
